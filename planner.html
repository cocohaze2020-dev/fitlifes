<!DOCTYPE html>
<html>
<head>
  <title>Planner - FitLife</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>FitLife</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="services.html">Services</a>
    <a href="gallery.html">Gallery</a>
    <a href="contact.html">Contact</a>
    <a href="planner.html">Planner</a>
  </nav>
</header>

<section>
  <h2>Fitness Planner</h2>

  <!-- BMI CALCULATOR -->
  <h3>Calculate Your BMI</h3>
  <input type="number" id="weight" placeholder="Weight (kg)">
  <input type="number" id="height" placeholder="Height (cm)">
  <br><br>
  <button class="btn" onclick="calculateBMI()">Calculate</button>

  <p id="bmiResult"></p>
  <p id="suggestion"></p>

  <!-- WORKOUT PLAN -->
  <h3>Workout Plan Suggestion</h3>
  <select id="goal">
    <option value="lose">Weight Loss</option>
    <option value="gain">Muscle Gain</option>
    <option value="maintain">Maintain</option>
  </select>

  <button class="btn" onclick="showWorkout()">Show Plan</button>

  <div id="workoutPlan"></div>

  <!-- MEAL PLAN -->
  <h3>Meal Plan Suggestion</h3>
  <button class="btn" onclick="showMeal()">Get Meal Plan</button>
  <div id="mealPlan"></div>

</section>

<script src="script.js"></script>
</body>
</html>
